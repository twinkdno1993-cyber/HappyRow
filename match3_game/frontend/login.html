<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Match-3 Game</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 400px; margin: 0 auto;">
            <h2>🔐 Login</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <div id="message"></div>
            <p style="margin-top: 20px; text-align: center;">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    messageDiv.innerHTML = '<div class="success">✅ Login successful! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    messageDiv.innerHTML = `<div class="error">❌ ${data.detail || 'Login failed'}</div>`;
                }
            } catch (err) {
                messageDiv.innerHTML = '<div class="error">❌ Connection error</div>';
            }
        });
    </script>
</body>
</html>
